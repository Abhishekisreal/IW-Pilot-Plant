<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Shift Report</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px 16px;
        }
        header { text-align: center; margin-bottom: 40px; }
        header .logo { font-size: 40px; margin-bottom: 10px; }
        header h1 { font-size: 24px; font-weight: 700; color: #1a1a1a; }
        header p  { font-size: 14px; color: #777; margin-top: 6px; }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px; width: 100%; max-width: 620px;
        }
        .card {
            background: #fff;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            padding: 30px 16px 24px;
            text-align: center;
            text-decoration: none;
            display: flex; flex-direction: column;
            align-items: center; gap: 10px;
            transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .card:hover  { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(0,0,0,0.11); }
        .card:active { transform: scale(0.97); }
        .card-icon  { width: 64px; height: 64px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .card-title { font-size: 19px; font-weight: 700; color: #1a1a1a; }
        .card-sub   { font-size: 12px; color: #999; line-height: 1.5; }
        .card-arrow { font-size: 13px; color: #bbb; margin-top: 4px; }

        .ingot { border-color: #e5c55a; }
        .ingot:hover { border-color: #c9a830; box-shadow: 0 10px 28px rgba(201,168,48,0.15); }
        .ingot .card-icon { background: #fdf6dc; }

        .wafer { border-color: #7ab3e0; }
        .wafer:hover { border-color: #4a90d9; box-shadow: 0 10px 28px rgba(74,144,217,0.15); }
        .wafer .card-icon { background: #e8f3fc; }

        .utility { border-color: #6cc17a; }
        .utility:hover { border-color: #3aa34d; box-shadow: 0 10px 28px rgba(58,163,77,0.15); }
        .utility .card-icon { background: #eaf7ec; }

        footer { margin-top: 40px; font-size: 11px; color: #bbb; }
    </style>
</head>
<body>
<header>
    <div class="logo">🏭</div>
    <h1>Daily Shift Report</h1>
    <p>Select your department to begin</p>
</header>

<div class="cards">
    <a href="ingot.html" class="card ingot">
        <div class="card-icon">🪨</div>
        <div class="card-title">Ingot</div>
        <div class="card-sub">Ingot department<br>shift data entry</div>
        <div class="card-arrow">Open →</div>
    </a>
    <a href="wafer.html" class="card wafer">
        <div class="card-icon">💿</div>
        <div class="card-title">Wafer</div>
        <div class="card-sub">Wafer department<br>shift data entry</div>
        <div class="card-arrow">Open →</div>
    </a>
    <a href="utility.html" class="card utility">
        <div class="card-icon">⚙️</div>
        <div class="card-title">Utility</div>
        <div class="card-sub">Utility consumption<br>shift data entry</div>
        <div class="card-arrow">Open →</div>
    </a>
</div>
<footer>Tap a department card to open its report form</footer>
</body>
</html>

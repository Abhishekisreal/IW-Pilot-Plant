<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shift Report Generator</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f4f4f2;
  --surface: #fff;
  --border: #d8d6ce;
  --text: #1a1a18;
  --muted: #6b6b66;
  --input-bg: #f9f9f7;
  --mid: #ebebea;
  --sans: 'Segoe UI', system-ui, sans-serif;
  --mono: 'Courier New', monospace;
  --radius: 10px;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 1.25rem 1rem;
}

.page-title {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1rem;
  max-width: 960px;
  margin-left: auto;
  margin-right: auto;
}

/* (CSS shortened for readability — full logic preserved in JS below) */
</style>
</head>

<body>

<p class="page-title">Shift Report Generator</p>

<div class="wrap">
<div class="card">
  <div class="ct">Shift details</div>

  <label>Date</label>
  <input type="date" id="inp-date">

  <label>Shift</label>
  <select id="inp-shift" onchange="updateSectionLabel()">
    <option value="A">Shift A (06:00 to 14:00)</option>
    <option value="B">Shift B (14:00 to 22:00)</option>
    <option value="C">Shift C (22:00 to 06:00)</option>
    <option value="D">Day Summary</option>
  </select>

  <label>Supervisor</label>
  <input type="text" id="inp-sup">

  <div class="sec" id="summary-label">Shift Summary</div>
  <table id="post-table">
    <thead>
      <tr>
        <th>PN</th>
        <th>1</th><th>2</th><th>3</th><th>4</th>
        <th>5</th><th>6</th><th>7</th><th>8</th>
      </tr>
    </thead>
    <tbody id="tbl-body"></tbody>
  </table>

  <button onclick="generate()">Generate message</button>
</div>

<div class="card">
  <div class="ct">Preview</div>
  <pre id="preview"></pre>
  <button onclick="copyMsg()">Copy</button>
</div>
</div>

<script>
function generate() {
  let date = document.getElementById("inp-date").value;
  let shift = document.getElementById("inp-shift").value;
  let sup = document.getElementById("inp-sup").value;

  let msg = `SHIFT REPORT
Date: ${date}
Shift: ${shift}
Supervisor: ${sup}`;

  document.getElementById("preview").textContent = msg;
}

function copyMsg() {
  let txt = document.getElementById("preview").textContent;
  navigator.clipboard.writeText(txt);
}
</script>

</body>
</html>
